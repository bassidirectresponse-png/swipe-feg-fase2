name: Transcrição automática de vídeos

# Sempre que houver um MP4 novo (subido pelo app) sem transcrição, baixa,
# roda o Whisper (local, sem API key) e grava a transcrição de volta — ela
# aparece automaticamente ao lado do vídeo no app.
# Varredura completa às 06:00 e 18:00 de São Paulo + botão manual.

on:
  push:
    branches: [main]
    paths:
      - "scripts/transcrever.py"
      - "scripts/traduzir_transcricoes.py"
      - "scripts/requirements-transcricao.txt"
      - ".github/workflows/transcrever-videos.yml"
  schedule:
    - cron: "0 9 * * *"     # 06:00 America/Sao_Paulo (UTC-3)
    - cron: "0 21 * * *"    # 18:00 America/Sao_Paulo (UTC-3)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: transcrever
  cancel-in-progress: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      WHISPER_MODEL: small     # tiny/base/small/medium/large-v3 (maior = + preciso, + lento)
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements-transcricao.txt

      - name: Instalar faster-whisper
        run: pip install -r scripts/requirements-transcricao.txt

      - name: Cache do modelo Whisper
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/huggingface
          key: whisper-${{ env.WHISPER_MODEL }}

      - name: Transcrever vídeos pendentes
        env:
          SUPABASE_BOT_EMAIL: ${{ secrets.SUPABASE_BOT_EMAIL }}
          SUPABASE_BOT_PASSWORD: ${{ secrets.SUPABASE_BOT_PASSWORD }}
          TRANSCRIBE_KINDS: "criativo,megabrain"
          MAX_VIDEOS: "200"
          MAX_RUN_MINUTES: "300"
          MAX_RETRIES: "8"
          TRANSCRIPTION_LOCK_MINUTES: "180"
          TRANSCRIPTION_VERSION: "1"
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/transcrever.py

      - name: Traduzir transcrições para português
        if: always()
        env:
          SUPABASE_BOT_EMAIL: ${{ secrets.SUPABASE_BOT_EMAIL }}
          SUPABASE_BOT_PASSWORD: ${{ secrets.SUPABASE_BOT_PASSWORD }}
          MAX_TRANSLATIONS: "80"
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/traduzir_transcricoes.py
