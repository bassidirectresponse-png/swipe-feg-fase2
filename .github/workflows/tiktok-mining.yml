name: Radar TikTok (mineração diária)

# Minera vídeos orgânicos do TikTok por nicho e grava no Supabase (kind:"tiktok").
# Roda 1x/dia e também dá pra disparar na mão em Actions → Run workflow.
# Fonte de dados = PROVIDER (tikwm grátis por padrão; troca p/ pago quando a key chegar).

on:
  schedule:
    - cron: "0 8 * * *"     # 05h BRT (08:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: tiktok-mining
  cancel-in-progress: false

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROVIDER: apify         # tikwm | ensembledata | apify
      APIFY_SORT: MOST_LIKED  # MOST_RELEVANT | MOST_LIKED | LATEST
      APIFY_DATE: PAST_MONTH  # ALL_TIME | PAST_WEEK | PAST_MONTH | PAST_24_HOURS
      # Teto de custo Apify: guarda no máx. ~100/dia (12 por nicho × 8 nichos ≈ 96)
      # e raspa ~metade do volume anterior (PER_KEYWORD 15→8 corta ~47% dos itens
      # raspados, que é o que a Apify cobra). Ajuste aqui se mudar o nº de nichos.
      MAX_PER_NICHE: "12"
      MAX_AGE_DAYS: "60"
      PER_KEYWORD: "8"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Minerar TikTok
        env:
          SUPABASE_BOT_EMAIL: ${{ secrets.SUPABASE_BOT_EMAIL }}
          SUPABASE_BOT_PASSWORD: ${{ secrets.SUPABASE_BOT_PASSWORD }}
          # Chaves dos provedores pagos (preencher quando ligar):
          ENSEMBLE_TOKEN: ${{ secrets.ENSEMBLE_TOKEN }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python -u scripts/tiktok_mining.py
