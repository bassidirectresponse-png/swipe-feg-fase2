name: Security gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout completo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-transcricao.txt
      - name: Dependências reproduzíveis
        run: npm ci --ignore-scripts
      - name: Build estático validado
        run: npm run build
      - name: Testes
        run: npm test
      - name: Auditoria de dependências
        run: npm audit --omit=dev --audit-level=low
      - name: Auditoria de dependências Python
        run: |
          python -m pip install pip-audit==2.10.1
          pip-audit --requirement scripts/requirements-transcricao.txt
      - name: Segredos no código e histórico
        run: npm run security:secrets
      - name: CSP sincronizada com o app
        run: npm run security:csp
      - name: Gerar SBOM CycloneDX
        run: npm sbom --omit=dev --sbom-format=cyclonedx > sbom.cdx.json
      - name: Publicar SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 14
          if-no-files-found: error
