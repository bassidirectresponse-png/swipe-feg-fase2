name: Seed Primal Viking Insider

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/ingest_primal_viking.mjs"
      - "assets/primal-viking/**"
      - ".github/workflows/seed-primal-viking.yml"

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Cadastrar ou atualizar Primal Viking
        env:
          SUPABASE_BOT_EMAIL: ${{ secrets.SUPABASE_BOT_EMAIL }}
          SUPABASE_BOT_PASSWORD: ${{ secrets.SUPABASE_BOT_PASSWORD }}
        run: node scripts/ingest_primal_viking.mjs
