name: Seed Ancestral Supplements, Mars Men and Ultima Peak

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/ingest_extra_brands.mjs"
      - "assets/ancestral-supplements/**"
      - "assets/mars-men/**"
      - "assets/ultima-peak/**"
      - ".github/workflows/seed-extra-brands.yml"

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Cadastrar Ancestral Supplements
        env:
          SUPABASE_BOT_EMAIL: ${{ secrets.SUPABASE_BOT_EMAIL }}
          SUPABASE_BOT_PASSWORD: ${{ secrets.SUPABASE_BOT_PASSWORD }}
        run: node scripts/ingest_extra_brands.mjs ancestral-supplements
      - name: Cadastrar Mars Men
        env:
          SUPABASE_BOT_EMAIL: ${{ secrets.SUPABASE_BOT_EMAIL }}
          SUPABASE_BOT_PASSWORD: ${{ secrets.SUPABASE_BOT_PASSWORD }}
        run: node scripts/ingest_extra_brands.mjs mars-men
      - name: Cadastrar Ultima Peak
        env:
          SUPABASE_BOT_EMAIL: ${{ secrets.SUPABASE_BOT_EMAIL }}
          SUPABASE_BOT_PASSWORD: ${{ secrets.SUPABASE_BOT_PASSWORD }}
        run: node scripts/ingest_extra_brands.mjs ultima-peak
